<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>International Match Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h2 class="heading">International Match Dashboard</h2>

  <div class="container">
    <div class="card" id="match-summary"></div>
    <div class="card" id="match-result"></div>
    <div class="card" id="batting-card"></div>
    <div class="card" id="bowling-card"></div>
    <div class="card">
      <h3>Last 6 Overs</h3>
      <div class="bars" id="last-overs"></div>
    </div>
    <div class="card" id="extra-info"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
